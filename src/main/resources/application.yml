server:
  port: 8090

spring:
  application:
    name: ddb-knowledge-agent
  datasource:
    url: jdbc:postgresql://localhost:5432/ddb_agent
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # Required to run schema.sql for pgvector extension and specialized indexes
      mode: always
  jpa:
    hibernate:
      # Use 'none' or 'validate' when schema.sql handles DDL
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# LangChain4j Config
langchain4j:
  google-ai-studio:
    chat-model:
      api-key: ${GOOGLE_API_KEY}
      model-name: gemini-3.1-flash-lite-preview

agent:
  cache:
    # Threshold for semantic cache hit (1.0 is exact match)
    semantic-threshold: 0.92
  ingest:
    docs-path: ${INGEST_DOCS_PATH:/home/localdev/projects/amazon-dynamodb-developer-guide/doc_source}
