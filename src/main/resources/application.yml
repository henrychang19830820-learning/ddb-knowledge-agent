server:
  port: 8090

spring:
  application:
    name: ddb-knowledge-agent
  # Optionally load secrets (e.g. GOOGLE_API_KEY) from a local, gitignored .env file.
  # The [.properties] suffix parses the extensionless file as key=value pairs.
  # Missing file is fine ("optional:") — OS environment variables still work.
  config:
    import: "optional:file:.env[.properties]"
  datasource:
    url: jdbc:postgresql://localhost:5432/ddb_agent
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      # Required to run schema.sql for pgvector extension and specialized indexes
      mode: always
  jpa:
    hibernate:
      # Use 'none' or 'validate' when schema.sql handles DDL
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# LangChain4j Config
langchain4j:
  google-ai-studio:
    chat-model:
      api-key: ${GOOGLE_API_KEY}

agent:
  routing:
    simple-threshold: 3
    medium-threshold: 6
    classifier-model: "gemini-3.1-flash-lite"
    simple-tier-model: "gemini-3.1-flash-lite"
    medium-tier-model: "gemini-2.5-flash"
    complex-tier-model: "gemini-3.5-flash"
  cache:
    # Threshold for semantic cache hit (1.0 is exact match)
    semantic-threshold: 0.92
  ingest:
    docs-path: ${INGEST_DOCS_PATH:local_test_docs}
  pricing:
    gemini-35-flash:
      input-price-per-1m: 1.50
      output-price-per-1m: 9.00
    gemini-3-flash:
      input-price-per-1m: 0.50
      output-price-per-1m: 3.00
    gemini-31-flash-lite:
      input-price-per-1m: 0.25
      output-price-per-1m: 1.50
    gemini-31-flash-lite-preview:
      input-price-per-1m: 0.25
      output-price-per-1m: 1.50
    gemini-25-pro:
      input-price-per-1m: 1.25
      output-price-per-1m: 10.00
    gemini-25-flash:
      input-price-per-1m: 0.30
      output-price-per-1m: 2.50
    gemini-25-flash-lite:
      input-price-per-1m: 0.10
      output-price-per-1m: 0.40
